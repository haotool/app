<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>離線模式｜PaperTrade</title>
    <meta name="theme-color" content="#0b0e14" />
    <style>
      :root {
        --bg: #0b0e14;
        --fg: #f2f4f8;
        --muted: #9aa4b2;
        --card: #12161f;
        --border: #232b36;
        --primary: #4f7cff;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--fg);
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial,
          'Noto Sans TC', sans-serif;
        display: grid;
        place-items: center;
      }
      .card {
        width: min(520px, calc(100vw - 32px));
        border-radius: 16px;
        padding: 24px;
        background: var(--card);
        border: 1px solid var(--border);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 22px;
        letter-spacing: -0.01em;
      }
      p {
        margin: 0 0 16px;
        color: var(--muted);
        line-height: 1.55;
      }
      button {
        appearance: none;
        border: 0;
        background: var(--primary);
        color: var(--fg);
        padding: 10px 14px;
        border-radius: 12px;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>你目前離線中</h1>
      <p>即時行情需要網路連線。已快取的頁面仍可瀏覽，請檢查連線後再試一次。</p>
      <button type="button" onclick="location.reload()">重新整理</button>
    </div>
  </body>
</html>
