<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Split Meow maskable">
  <!--
    Maskable icon: cat artwork scaled to 78% and centered.
    Safe zone (r=204px from center): all content fits within ~200px radius.
    Background fills full canvas — OS will apply its own mask shape.
  -->
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ece0ff"/>
      <stop offset="100%" stop-color="#9b7fd4"/>
    </linearGradient>
    <radialGradient id="face2" cx="42%" cy="38%" r="60%">
      <stop offset="0%" stop-color="#faf5ff"/>
      <stop offset="50%" stop-color="#ead9ff"/>
      <stop offset="100%" stop-color="#c4a8f5"/>
    </radialGradient>
  </defs>

  <!-- Full-bleed background (no rounded corners — OS provides the mask) -->
  <rect width="512" height="512" fill="url(#bg2)"/>

  <!-- Cat artwork scaled 78%, centered: translate(56,56) scale(0.78) -->
  <g transform="translate(56 56) scale(0.78)">
