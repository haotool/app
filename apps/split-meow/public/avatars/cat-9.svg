  <path d="M58 75c2 3.5 5 5 6 5s4-1.5 6-5" fill="none" stroke="#313331" stroke-width="3" stroke-linecap="round"/>
  <!-- rosy cheeks -->
  <ellipse cx="45" cy="73" rx="7" ry="4" fill="#ff7050" opacity="0.2"/>
  <ellipse cx="83" cy="73" rx="7" ry="4" fill="#ff7050" opacity="0.2"/>
