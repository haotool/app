<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="white" opacity="0.05"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <g transform="translate(600, 180)">
    <circle r="50" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.3"/>
    <circle r="35" fill="url(#accent)" opacity="0.15"/>
    <path d="M0,-20 L12,-8 L8,0 L0,20 L-8,0 L-12,-8 Z" fill="url(#accent)" opacity="0.8"/>
    <circle r="6" fill="white" cy="-8"/>
  </g>
  <text x="600" y="340" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="72" font-weight="900" fill="white" letter-spacing="-2">停車好工具</text>
  <text x="600" y="400" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="28" font-weight="600" fill="#60a5fa" letter-spacing="8" opacity="0.9">PARKKEEPER</text>
  <text x="600" y="460" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" fill="white" opacity="0.5">智慧停車記錄與導航 PWA</text>
  <text x="600" y="580" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="white" opacity="0.3">haotool.org</text>
  <rect x="500" y="420" width="200" height="2" rx="1" fill="url(#accent)" opacity="0.3"/>
</svg>
