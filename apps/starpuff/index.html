<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <!-- SEO 區塊由 src/seo/seo-metadata.ts（SSOT）經 vite-seo-plugin 建置期注入，禁止在此硬編。 -->
    <!-- %SEO_HEAD% -->
    <meta name="theme-color" content="#BFF3E0" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="StarPuff" />
    <!-- iOS standalone 邊到邊（§33）：搭配 viewport-fit=cover 讓遊戲延伸至瀏海後方，safe-area 由 CSS 自理。 -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" href="icons/favicon.png" type="image/png" />
  </head>
  <body>
    <!-- %SEO_BODY% -->
    <div id="game-shell" role="main" aria-label="星噗噗遊戲畫面">
      <div id="app"></div>
      <div id="controls">
        <div id="joy-zone" role="application" aria-label="虛擬搖桿：拖曳移動">
          <div class="joy-ring" aria-hidden="true"></div>
          <div class="joy-thumb" aria-hidden="true"></div>
        </div>
        <div id="keys-layer">
          <!-- SP 情境鍵（§109）：僅技能可用時淡入；圖形由 canvas 繪製（禁 emoji/文字鍵帽）。 -->
          <div
            class="ctl-btn ctl-btn-sp"
            role="button"
            tabindex="0"
            data-btn="sp"
            aria-label="特殊技能：引爆星暴或變身"
            aria-hidden="true"
          >
            <canvas class="sp-glyph" width="128" height="128" aria-hidden="true"></canvas>
          </div>
          <div
            class="ctl-btn ctl-btn-b"
            role="button"
            tabindex="0"
            data-btn="b"
            aria-label="吸入或發射"
          ></div>
          <div
            class="ctl-btn ctl-btn-a"
            role="button"
            tabindex="0"
            data-btn="a"
            aria-label="跳躍"
          ></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
