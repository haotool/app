<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <title>星噗噗 StarPuff｜吸入果凍怪的 Q 彈動作小遊戲</title>
    <meta name="theme-color" content="#BFF3E0" />
    <meta
      name="description"
      content="直向 Boss Rush 動作小遊戲：吸入果凍怪、化為星彈、擊敗果凍王。免安裝、離線可玩。"
    />
    <meta property="og:title" content="星噗噗 StarPuff" />
    <meta property="og:description" content="吸入果凍怪、化為星彈、擊敗果凍王的 Q 彈動作小遊戲。" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://app.haotool.org/starpuff/" />
    <meta property="og:locale" content="zh_TW" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="StarPuff" />
    <link rel="icon" href="icons/favicon.png" type="image/png" />
    <meta property="og:image" content="https://app.haotool.org/starpuff/icons/og-image.png" />
  </head>
  <body>
    <div id="app"></div>
    <div id="rotate-hint">請將手機轉橫遊玩</div>
    <div id="controls">
      <div id="joy-zone" role="application" aria-label="虛擬搖桿：拖曳移動">
        <div class="joy-ring" aria-hidden="true"></div>
        <div class="joy-thumb" aria-hidden="true"></div>
      </div>
      <div class="controls-right">
        <div
          class="ctl-btn ctl-btn-b"
          role="button"
          tabindex="0"
          data-btn="b"
          aria-label="吸入或發射"
        ></div>
        <div
          class="ctl-btn ctl-btn-a"
          role="button"
          tabindex="0"
          data-btn="a"
          aria-label="跳躍"
        ></div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
