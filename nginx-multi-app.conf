worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # Security headers (Lighthouse Best Practices 100)
    # [context7:googlechrome/lighthouse-ci:2025-10-20T04:10:04+08:00]
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Content Security Policy (CSP) - 支援 Next.js 和 Vite 應用
    # [fix:2025-11-03] 放寬 CSP 以支援 Next.js 內聯腳本和 Cloudflare
    # 參考: [context7:/vercel/next.js:2025-11-03T16:30:00+08:00]
    # Next.js 需要 'unsafe-inline' 和 'unsafe-eval' 來執行 hydration 和客戶端腳本
    # Vite PWA 需要訪問 Service Worker 相關資源
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://static.cloudflareinsights.com https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://raw.githubusercontent.com https://cdn.jsdelivr.net https://cloudflareinsights.com https://*.ingest.sentry.io; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'; worker-src 'self' blob:; manifest-src 'self'; report-uri /csp-report; report-to csp-endpoint;" always;

    # Report-To API (現代瀏覽器支援)
    # [ref: W3C Reporting API 2025]
    add_header Report-To '{"group":"csp-endpoint","max_age":31536000,"endpoints":[{"url":"/csp-report"}]}' always;

    # HTTP Strict Transport Security (HSTS) - 強制 HTTPS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Cross-Origin-Opener-Policy (COOP) - 隔離瀏覽器上下文
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    # Cross-Origin-Embedder-Policy (COEP)
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    # Cross-Origin-Resource-Policy (CORP)
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # Referrer Policy - 控制 referrer 資訊洩露
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions Policy - 限制瀏覽器功能
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

    # Multi-App Server (Poplog + RateWise)
    # [fix:2025-11-03] 完全重構配置以正確處理 Next.js basePath 和 Vite SPA
    # 參考: [context7:/vercel/next.js:2025-11-03T16:00:00+08:00]
    server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Root path redirect to poplog
        location = / {
            return 301 /poplog;
        }

        # Handle root-level manifest and favicon for both apps
        # [fix:2025-11-03] 優先嘗試 Poplog，fallback 到 RateWise
        location = /manifest.json {
            try_files /poplog/manifest.json /ratewise/manifest.webmanifest =404;
            add_header Content-Type application/json;
            add_header Cache-Control "public, max-age=3600";
        }

        location = /favicon.ico {
            try_files /poplog/favicon.ico /ratewise/favicon.ico =404;
            add_header Content-Type image/x-icon;
            add_header Cache-Control "public, max-age=86400";
        }

        # ==================== Poplog Application (Next.js with basePath=/poplog) ====================
        # [CRITICAL:2025-11-03] Poplog 必須在最前面，避免被其他 location 攔截
        # Next.js static export 使用 basePath 時，所有檔案都已包含 /poplog 前綴
        # 因此使用 root 指令，nginx 會自動在 /usr/share/nginx/html/poplog/ 下尋找檔案
        
        # Poplog 靜態資源 - 最高優先級（Next.js _next/static 資料夾）
        location ~ ^/poplog/_next/static/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Poplog 其他靜態資源
        location ~ ^/poplog/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|json)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Poplog SEO 和 manifest 檔案
        location = /poplog/sitemap.xml {
            add_header Content-Type application/xml;
            add_header Cache-Control "public, max-age=3600";
        }

        location = /poplog/robots.txt {
            add_header Content-Type text/plain;
            add_header Cache-Control "public, max-age=3600";
        }

        location = /poplog/manifest.webmanifest {
            add_header Content-Type application/manifest+json;
            add_header Cache-Control "public, max-age=3600";
        }

        location = /poplog/manifest.json {
            add_header Content-Type application/json;
            add_header Cache-Control "public, max-age=3600";
        }

        location = /poplog/llms.txt {
            add_header Content-Type text/plain;
            add_header Cache-Control "public, max-age=3600";
        }

        # Poplog SPA fallback - 必須在最後
        # 參考: Next.js static export 文件建議使用 try_files
        location /poplog/ {
            try_files $uri $uri.html $uri/ /poplog/index.html;
        }

        # Poplog exact root path (without trailing slash)
        location = /poplog {
            try_files /poplog/index.html =404;
        }

        # ==================== RateWise Application (Vite SPA) ====================
        # Vite SPA 建置輸出為單層結構，使用 alias 更合適
        
        # Handle PWA files from RateWise (root level)
        # [fix:2025-11-03] Service Worker 和 Workbox 檔案
        location ~ ^/(sw\.js|workbox-.+\.js)(\.map)?$ {
            alias /usr/share/nginx/html/ratewise/;
            try_files $1$2 =404;
            add_header Cache-Control "public, max-age=0, must-revalidate";
            add_header Service-Worker-Allowed "/";
        }

        # Handle root-level /assets requests (redirect to ratewise)
        # [fix:2025-11-03] SW 嘗試從根路徑載入 assets
        location /assets/ {
            alias /usr/share/nginx/html/ratewise/assets/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        
        # RateWise 靜態資源 - 最高優先級
        location ~ ^/ratewise/assets/ {
            alias /usr/share/nginx/html/ratewise/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # RateWise 其他靜態資源
        location ~ ^/ratewise/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|json)$ {
            alias /usr/share/nginx/html/ratewise/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # RateWise SEO 和 manifest 檔案
        location = /ratewise/sitemap.xml {
            alias /usr/share/nginx/html/ratewise/sitemap.xml;
            add_header Content-Type application/xml;
            add_header Cache-Control "public, max-age=3600";
        }

        location = /ratewise/manifest.webmanifest {
            alias /usr/share/nginx/html/ratewise/manifest.webmanifest;
            add_header Content-Type application/manifest+json;
            add_header Cache-Control "public, max-age=3600";
        }

        location = /ratewise/robots.txt {
            alias /usr/share/nginx/html/ratewise/robots.txt;
            add_header Content-Type text/plain;
            add_header Cache-Control "public, max-age=3600";
        }

        location = /ratewise/llms.txt {
            alias /usr/share/nginx/html/ratewise/llms.txt;
            add_header Content-Type text/plain;
            add_header Cache-Control "public, max-age=3600";
        }

        # RateWise SPA fallback - 處理所有非檔案請求
        # 注意：使用 alias 時，try_files 的路徑是相對於 alias 目錄
        location /ratewise/ {
            alias /usr/share/nginx/html/ratewise/;
            try_files $uri $uri/ /ratewise/index.html;
        }

        # RateWise exact root path (without trailing slash)
        location = /ratewise {
            alias /usr/share/nginx/html/ratewise/index.html;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # CSP 違規報告端點
        location /csp-report {
            access_log /var/log/nginx/csp-violations.log;
            return 204;
        }
    }
}
