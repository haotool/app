# SEO 匯差範例數據每週更新
#
# 職責：每週一抓取最新臺灣銀行牌告匯率，計算各幣別現金匯率與即期匯率差距，
#        更新 apps/ratewise/src/config/generated/seo-rate-examples.ts 並提交。
# 觸發：每週一 02:00 UTC（台灣時間週一 10:00）+ 手動觸發

name: Update SEO Rate Examples

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: 安裝依賴
        run: pnpm install --frozen-lockfile

      - name: 執行匯差範例更新腳本
        run: node apps/ratewise/scripts/update-seo-rate-examples.mjs

      - name: 確認檔案變更
        id: check
        run: |
          if git diff --quiet apps/ratewise/src/config/generated/seo-rate-examples.ts; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: 提交更新
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/ratewise/src/config/generated/seo-rate-examples.ts
          git commit -m "chore(seo): 每週更新匯差範例數據

          - 自動更新各幣別現金賣出 vs 即期賣出差距
          - 資料來源：臺灣銀行牌告匯率

          測試：GitHub Actions 自動觸發"
          git push

      - name: 無變更
        if: steps.check.outputs.changed == 'false'
        run: echo "ℹ️ 匯差範例數據無變更，略過提交。"
