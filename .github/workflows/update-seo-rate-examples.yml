# SEO 匯差範例數據每日更新
#
# 職責：每日抓取最新臺灣銀行牌告匯率，更新 runtime fallback snapshot，
#        並計算各幣別現金匯率與市場中間價差距。
#
# 流程（業界最佳實踐 — PR-based，不直接 push main）：
#   1. 執行腳本（雙重驗證：台銀牌告 + open.er-api.com）
#   2. 若有變更，peter-evans/create-pull-request@v8 建立 PR 分支
#   3. 以 gh pr merge --auto 掛上 GitHub auto-merge，
#      交由 branch protection / required checks / maintainer review 或 GitHub auto-merge 合併
#   4. 無變更時不建立 PR，靜默略過
#
# 為何不直接 push main：
#   - 避免繞過 branch protection 與必要的 CI 檢查（typecheck/test/build）
#   - PR 流程確保每次入 main 的資料均通過完整驗證
#   - 可追溯：每次更新均有獨立 PR 紀錄與 CI 狀態
#   - auto-merge 僅為排隊機制：required checks 未過不會合併，禁止的是繞過 checks 的直接合併
#
# 觸發：每日 02:00 UTC（台灣時間 10:00）+ 手動觸發

name: Update SEO Rate Examples

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5
        with:
          version: 9.10.0

      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: 安裝依賴
        run: pnpm install --frozen-lockfile

      - name: 更新 build-time fallback 匯率 snapshot
        run: pnpm --filter @app/ratewise refresh:fallback-rates

      - name: 執行匯差範例更新腳本（雙重驗證模式）
        run: node apps/ratewise/scripts/update-seo-rate-examples.mjs

      - name: 建立 PR（若有變更）
        id: create-pr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          commit-message: |
            chore(seo): 每日更新匯差範例數據

            - 自動更新 build-time fallback 匯率 snapshot
            - 自動更新各幣別現金賣出 vs 市場中間價差距（換 3 萬台幣情境）
            - 雙重驗證：open.er-api.com 中間價 vs 台銀自身 (買入+賣出)/2 中間價
            - 差距超過 2% 幣別已警告（東南亞幣別預期偏高）

            測試：GitHub Actions 排程自動觸發
          branch: chore/daily-seo-rate-update
          delete-branch: true
          title: 'chore(seo): 每日更新匯差範例數據'
          body: |
            ## 自動更新：RateWise 匯率 fallback 與 SEO 匯差範例數據

            由 GitHub Actions 排程每日自動執行。腳本：[`update-seo-rate-examples.mjs`](apps/ratewise/scripts/update-seo-rate-examples.mjs)

            ### 資料來源雙重驗證

            | 來源 | 說明 |
            |------|------|
            | `cdn.jsdelivr.net` 台銀牌告 | 現金賣出價（臨櫃實際到手） |
            | `open.er-api.com` | 市場中間價（Google / XE / Wise / Apple 基準） |
            | 台銀 `(買入+賣出)/2` | 雙重驗證，差距 ≤ 2% 才通過 |

            ### 生成欄位

            `foreignAtCash` / `foreignAtMarketMid` / `diffForeign` / `diffTWD` / `diffPct` / `marketMid` / `bankMid`

            ### 自動化

            - PR 建立後由 workflow 掛上 GitHub auto-merge（squash），required checks 通過後自動合併
            - 合併仍由 branch protection 與 required checks 把關，checks 未過不會合併
            - 無變更時不建立 PR，靜默略過
            - 幣別資料缺漏時腳本 `exit(1)`，工作流程明確失敗
          labels: |
            automated
            seo
          add-paths: |
            apps/ratewise/src/config/generated/build-time-rates.json
            apps/ratewise/src/config/generated/seo-rate-examples.ts

      # 啟用 GitHub auto-merge（squash）：合併仍由 branch protection + required checks 把關，
      # checks 未通過不會合併；此步驟只是免除人工點擊，非繞過審查控制。
      # 掛載失敗不得讓整個排程紅燈：資料 PR 已建立即主要交付物完成，人工仍可合併；
      # 失敗由後續 step 以 outcome 判定並發 warning（repo 規則：continue-on-error 不得用 conclusion）。
      - name: 啟用 auto-merge（待 required checks 通過後自動合併）
        id: enable-automerge
        if: steps.create-pr.outputs.pull-request-number != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.create-pr.outputs.pull-request-number }}
        run: |
          for i in 1 2 3; do
            if gh pr merge --auto --squash "$PR_NUMBER"; then
              echo "✅ Auto-merge enabled for PR #${PR_NUMBER} (attempt $i)"
              exit 0
            fi
            if [ $i -lt 3 ]; then
              echo "⚠️ Enabling auto-merge failed (attempt $i/3), retrying in 5 seconds..."
              sleep 5
            fi
          done
          echo "❌ Failed to enable auto-merge after 3 attempts"
          exit 1

      - name: Auto-merge 掛載失敗告警
        if: steps.create-pr.outputs.pull-request-number != '' && steps.enable-automerge.outcome == 'failure'
        env:
          PR_URL: ${{ steps.create-pr.outputs.pull-request-url }}
        run: |
          echo "::warning::PR 已建立但 auto-merge 掛載失敗（重試 3 次），需人工合併：${PR_URL}"
          echo "## ⚠️ Auto-merge 掛載失敗" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 資料 PR 已成功建立：${PR_URL}" >> $GITHUB_STEP_SUMMARY
          echo "- auto-merge 掛載重試 3 次均失敗（政策拒絕或暫時性錯誤），請人工檢查後合併" >> $GITHUB_STEP_SUMMARY

      - name: 無變更
        if: steps.create-pr.outputs.pull-request-number == ''
        run: echo "ℹ️ 匯差範例數據無變更，略過建立 PR。"
