name: Release

# 自動化版本管理與發布工作流
# 參考: Context7 /changesets/action - GitHub Actions 最佳實踐

on:
  push:
    branches:
      - main
  # bot 合併 release PR 的 push 不觸發 push workflow（GITHUB_TOKEN 防遞迴），
  # 由合併步驟以 workflow_dispatch 補派本 workflow 於 main 執行 tags / releases / 部署。
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v7
        with:
          # 需要完整歷史記錄來生成完整的 changelog
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.10.0
          run_install: false

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for Changeset Files
        id: check_changesets
        run: |
          if [ -n "$(find .changeset -maxdepth 1 -type f -name "*.md" ! -name "README.md")" ]; then
            echo "has_changesets=true" >> $GITHUB_OUTPUT
          else
            echo "has_changesets=false" >> $GITHUB_OUTPUT
          fi

      - name: Detect Version Changes
        id: detect_version
        run: |
          set -euo pipefail
          CHANGED_APPS=$(node scripts/get-release-metadata.mjs --changed)
          echo "changed_apps=${CHANGED_APPS}" >> "$GITHUB_OUTPUT"

          CHANGED_COUNT=$(echo "${CHANGED_APPS}" | node -e "
            const d = require('fs').readFileSync(0,'utf-8');
            console.log(JSON.parse(d).length);
          ")
          echo "changed_count=${CHANGED_COUNT}" >> "$GITHUB_OUTPUT"

          if [ "$CHANGED_COUNT" -gt 0 ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect RateWise release target
        id: ratewise_release
        if: steps.detect_version.outputs.changed == 'true'
        run: |
          set -euo pipefail
          RATEWISE_VERSION=$(echo '${{ steps.detect_version.outputs.changed_apps }}' | node -e "
            const apps = JSON.parse(require('fs').readFileSync(0, 'utf-8'));
            const ratewise = apps.find((app) => app.name === 'ratewise');
            process.stdout.write(ratewise?.version ?? '');
          ")

          if [ -n "$RATEWISE_VERSION" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version=$RATEWISE_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release Pull Request
        id: changesets
        if: steps.check_changesets.outputs.has_changesets == 'true'
        continue-on-error: true
        uses: changesets/action@v1
        with:
          version: pnpm changeset:version
          commit: 'chore(release): 更新版本套件'
          title: 'chore(release): 更新版本套件'
        env:
          # NOTE: Requires org + repo Settings → Actions → General → Workflow permissions
          #       → "Allow GitHub Actions to create and approve pull requests" enabled
          # If this fails with HTTP 403, ask an org admin to enable the setting.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # GITHUB_TOKEN 建立/更新 PR 時，pull_request run 停在 approval-required 狀態（防遞迴），
      # 必要檢查 Quality Checks 永不自動執行、auto-merge 也不會被喚醒（issue #771）。
      # 無 PAT / GitHub App 憑證下的全自動補償：workflow_dispatch 補跑 CI（官方例外）→
      # 等待 Quality Checks → 受 branch protection 把關的直接合併 → 補派 main workflows。
      - name: Trigger CI for release PR
        id: release_pr_ci
        if: steps.changesets.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # changesets 成功卻無 branch / 無 open PR：多為全空 changeset 被 action 略過
          # （"All changesets are empty; not creating PR"），空檔會永久殘留並堵住 tag 路徑，必須曝光。
          if ! git ls-remote --exit-code origin refs/heads/changeset-release/main >/dev/null 2>&1; then
            echo "::error::changesets step succeeded but changeset-release/main branch was not created. Check for empty changeset files blocking the release (remove .changeset/*.md with empty frontmatter)."
            exit 1
          fi

          PR_NUMBER=$(gh pr list --head changeset-release/main --base main --state open --json number --jq '.[0].number // empty')
          if [ -z "$PR_NUMBER" ]; then
            echo "::error::changesets step succeeded but no open release PR was found on changeset-release/main."
            exit 1
          fi

          # 釘住本次 QC 驗證的 head SHA，合併時以 --match-head-commit 防止合到未驗證的新 head。
          HEAD_SHA=$(git ls-remote origin refs/heads/changeset-release/main | cut -f1)

          # 以 run id 基準點定位本次 dispatch 產生的 run，避免時鐘偏移誤配舊 run。
          BASELINE_ID=$(gh run list --workflow ci.yml --branch changeset-release/main --event workflow_dispatch \
            --limit 1 --json databaseId --jq '.[0].databaseId // 0')
          gh workflow run ci.yml --ref changeset-release/main
          echo "Dispatched CI workflow on changeset-release/main for release PR #${PR_NUMBER}"

          RUN_ID=""
          for i in {1..12}; do
            sleep 5
            RUN_ID=$(gh run list --workflow ci.yml --branch changeset-release/main --event workflow_dispatch \
              --limit 5 --json databaseId --jq "map(select(.databaseId > ${BASELINE_ID})) | .[0].databaseId // empty")
            if [ -n "$RUN_ID" ]; then
              break
            fi
          done

          if [ -z "$RUN_ID" ]; then
            echo "::error::Dispatched CI run not found on changeset-release/main"
            exit 1
          fi

          echo "dispatched=true" >> "$GITHUB_OUTPUT"
          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "head_sha=${HEAD_SHA}" >> "$GITHUB_OUTPUT"
          echo "run_id=${RUN_ID}" >> "$GITHUB_OUTPUT"

      # 只等必要檢查 Quality Checks；e2e / lighthouse 等非必要 job 不阻擋合併（與人工流程一致）。
      - name: Wait for release PR Quality Checks
        if: steps.release_pr_ci.outputs.dispatched == 'true'
        timeout-minutes: 25
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          RUN_ID="${{ steps.release_pr_ci.outputs.run_id }}"

          while true; do
            # gh 暫時性失敗視同 pending，交由下一輪重查；不因 API 抖動失敗整個 release。
            STATUS=$(gh run view "$RUN_ID" --json jobs \
              --jq '.jobs[] | select(.name == "Quality Checks") | .status + ":" + (.conclusion // "")' || true)

            case "$STATUS" in
              completed:success)
                echo "Quality Checks passed on run ${RUN_ID}"
                break
                ;;
              completed:*)
                echo "::error::Quality Checks concluded '${STATUS#completed:}' on run ${RUN_ID}; release PR will not be merged."
                exit 1
                ;;
              *)
                echo "Quality Checks status: ${STATUS:-pending}, waiting..."
                sleep 30
                ;;
            esac
          done

      # 直接合併仍受 branch protection 伺服器端把關：required check 未過會被拒絕，並非繞過檢查。
      # 不能依賴 GitHub auto-merge：非 PR 事件的 check 完成不會喚醒 auto-merge（issue #771 實證）。
      - name: Merge release PR
        id: release_pr_merge
        if: steps.release_pr_ci.outputs.dispatched == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PR_NUMBER="${{ steps.release_pr_ci.outputs.pr_number }}"
          HEAD_SHA="${{ steps.release_pr_ci.outputs.head_sha }}"

          STATE=$(gh pr view "$PR_NUMBER" --json state --jq '.state')
          if [ "$STATE" != "OPEN" ]; then
            echo "Release PR #${PR_NUMBER} is ${STATE}, skipping merge"
            exit 0
          fi

          # 等待期間若 main 又累積新 changeset，改由排隊中的下一個 release run 整併後合併，
          # 避免先合入只含部分 bump 的 release PR 造成 tag 視窗（HEAD^ 比對）漏建 tag。
          git fetch origin main --quiet
          if [ -n "$(git log "${GITHUB_SHA}..origin/main" --pretty=%H -- .changeset)" ]; then
            echo "New changesets landed on main during Quality Checks; skipping merge and deferring to the queued release run for consolidation."
            exit 0
          fi

          for i in {1..3}; do
            if gh pr merge "$PR_NUMBER" --squash --match-head-commit "$HEAD_SHA"; then
              echo "merged=true" >> "$GITHUB_OUTPUT"
              echo "Release PR #${PR_NUMBER} merged"
              exit 0
            fi
            if [ "$i" -lt 3 ]; then
              echo "Merge attempt ${i}/3 failed, retrying in 10 seconds..."
              sleep 10
            fi
          done

          echo "::error::Failed to merge release PR #${PR_NUMBER} after Quality Checks passed."
          echo "::error::If the merge was rejected for missing required checks, branch protection did not accept the dispatched run — see issue #771; a PAT or GitHub App token would then be required."
          exit 1

      # bot（GITHUB_TOKEN）合併產生的 main push 不觸發 push workflow（防遞迴），
      # 必須補派 release.yml（tags / GitHub releases / 部署）與 ci.yml（main 品質訊號）。
      - name: Re-dispatch main workflows after bot merge
        if: steps.release_pr_merge.outputs.merged == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          sleep 5
          gh workflow run release.yml --ref main
          gh workflow run ci.yml --ref main
          echo "Dispatched release.yml and ci.yml on main to compensate suppressed push events"

      - name: Report Release PR status
        if: steps.changesets.outcome == 'failure'
        run: |
          echo "::error::Release PR creation failed. Check the changesets/action logs for commitlint, branch, or permission failures."
          echo "::error::If the error is HTTP 403, ask an org admin to enable: Organization Settings → Actions → General → Workflow permissions → Allow GitHub Actions to create and approve pull requests"
          exit 1

      - name: Configure git for tagging
        if: steps.check_changesets.outputs.has_changesets == 'false' && steps.detect_version.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create release tags
        if: steps.check_changesets.outputs.has_changesets == 'false' && steps.detect_version.outputs.changed == 'true'
        timeout-minutes: 5
        run: |
          set -euo pipefail
          git fetch --tags --force origin

          mapfile -t release_tags < <(echo '${{ steps.detect_version.outputs.changed_apps }}' | node -e "
            const apps = JSON.parse(require('fs').readFileSync(0, 'utf-8'));
            for (const app of apps) {
              console.log(app.packageName + '@' + app.version);
              console.log(app.name + '-v' + app.version);
            }
          " | sort -u)

          tag_refspecs=()
          for tag in "${release_tags[@]}"; do
            if [ -z "$tag" ]; then
              continue
            fi

            if ! git check-ref-format --allow-onelevel "$tag"; then
              echo "::error::Invalid release tag: $tag"
              exit 1
            fi

            if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
              echo "Tag ${tag} already exists on origin"
              continue
            fi

            if ! git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
              echo "Creating tag ${tag}"
              git tag "$tag"
            else
              echo "Tag ${tag} already exists locally"
            fi

            tag_refspecs+=("refs/tags/${tag}:refs/tags/${tag}")
          done

          if [ "${#tag_refspecs[@]}" -eq 0 ]; then
            echo "No new release tags to push"
            exit 0
          fi

          echo "Pushing ${#tag_refspecs[@]} release tags"
          HUSKY=0 git push origin "${tag_refspecs[@]}"

      - name: Create GitHub releases
        if: steps.check_changesets.outputs.has_changesets == 'false' && steps.detect_version.outputs.changed == 'true'
        timeout-minutes: 10
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo '${{ steps.detect_version.outputs.changed_apps }}' | node -e "
            const apps = JSON.parse(require('fs').readFileSync(0, 'utf-8'));
            for (const app of apps) {
              console.log(JSON.stringify({
                tag: app.packageName + '@' + app.version,
                title: app.displayName + ' v' + app.version,
              }));
            }
          " | while IFS= read -r meta; do
            TAG=$(echo "$meta" | jq -r '.tag')
            TITLE=$(echo "$meta" | jq -r '.title')

            if gh release view "$TAG" >/dev/null 2>&1; then
              echo "Release for $TAG already exists"
              continue
            fi

            gh release create "$TAG" --title "$TITLE" --notes "Automated release via Changesets workflow." --verify-tag
          done

      # Cloudflare Security Headers Worker 同步部署
      # 依 Cloudflare Workers CI/CD 文檔，非互動環境需使用 API Token 與 Account ID。
      - name: Deploy Cloudflare security-headers worker
        if: success()
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "⚠️ Cloudflare worker deploy secrets not configured, skipping security-headers worker deploy"
            echo "To enable: Add CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID to repository secrets"
            exit 0
          fi

          echo "🔐 Deploying security-headers worker for app.haotool.org/ratewise/* ..."
          npm ci --prefix security-headers
          npx --prefix security-headers wrangler deploy --config security-headers/wrangler.jsonc

      - name: Wait for RateWise production deployment
        if: success() && steps.ratewise_release.outputs.changed == 'true'
        env:
          RATEWISE_RELEASE_ACTION: wait
          RATEWISE_EXPECTED_VERSION: ${{ steps.ratewise_release.outputs.version }}
        run: node scripts/ratewise-production-release.mjs

      # RateWise 的 hashed assets 若在正式站尚未就緒前被 purge，Cloudflare 會先回填 404 並保留 stale edge。
      # 因此必須等到正式站版本已更新，再做定點 purge 與 live precache 驗證。
      - name: Purge RateWise Cloudflare Cache
        if: success() && steps.ratewise_release.outputs.changed == 'true'
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_ZONE_ID" ] || [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "⚠️ Cloudflare secrets not configured, skipping RateWise cache purge"
            echo "To enable: Add CLOUDFLARE_ZONE_ID and CLOUDFLARE_API_TOKEN to repository secrets"
            exit 0
          fi

          RATEWISE_RELEASE_ACTION=purge node scripts/ratewise-production-release.mjs

      - name: Verify RateWise live precache
        if: success() && steps.ratewise_release.outputs.changed == 'true'
        env:
          VERIFY_PRECACHE_SOURCE: live
          VERIFY_BASE_URL: https://app.haotool.org/ratewise/
        run: node scripts/verify-precache-assets.mjs

      # Cloudflare CDN 快取清除
      # 參考: Context7 /websites/developers_cloudflare - Cache Purge API
      - name: Purge Cloudflare Cache
        if: success() && steps.ratewise_release.outputs.changed != 'true'
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_ZONE_ID" ] || [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "⚠️ Cloudflare secrets not configured, skipping cache purge"
            echo "To enable: Add CLOUDFLARE_ZONE_ID and CLOUDFLARE_API_TOKEN to repository secrets"
            exit 0
          fi

          echo "🔄 Purging Cloudflare CDN cache..."
          RESPONSE=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')

          SUCCESS=$(echo "$RESPONSE" | jq -r '.success // false')
          if [ "$SUCCESS" = "true" ]; then
            echo "✅ Cloudflare CDN cache purged successfully"
          else
            echo "⚠️ Cache purge response: $RESPONSE"
            echo "Note: This is non-blocking. Cache will auto-expire within 1-24 hours."
          fi

      # 註: 由於這是 private monorepo，我們不發布到 npm
      # 如果未來需要發布，可以新增以下步驟：
      # - name: Publish to npm
      #   if: steps.changesets.outputs.hasChangesets == 'false'
      #   uses: changesets/action@v1
      #   with:
      #     publish: pnpm changeset:publish
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #     NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
