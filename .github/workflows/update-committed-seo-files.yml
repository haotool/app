# SEO 靜態產出物自動同步
#
# 職責：當版本號或 SEO 設定變更時，自動重新生成 committed SEO 靜態檔案並建立 PR
#
# 觸發條件（其中之一改變）：
#   - apps/ratewise/package.json（版本號升）
#   - apps/ratewise/seo-paths.config.mjs（路由 / 站點設定）
#   - apps/ratewise/src/features/ratewise/constants.ts（幣別數量）
#   - apps/ratewise/src/config/app-info.ts（APP_INFO / APP_MANIFEST）
#
# 產出物（committed，需與源碼同步）：
#   - apps/ratewise/public/manifest.webmanifest（PWA icon cache-busting）
#   - apps/ratewise/public/llms.txt（LLM 索引入口）
#   - apps/ratewise/public/llms-full.txt（LLM 完整技術文件）
#
# 流程（與 update-seo-rate-examples.yml 相同 pattern）：
#   1. 執行生成腳本
#   2. 若有變更，peter-evans/create-pull-request@v8 建立 PR
#   3. PR 通過 CI 後 auto-merge（squash）
#   4. 無變更時靜默略過
#
# 為何不直接 push main：
#   - 避免繞過 branch protection 與必要的 CI 檢查（typecheck/test/build）
#   - PR 流程確保每次入 main 的產出物均通過完整驗證

name: Update Committed SEO Files

on:
  push:
    branches: [main]
    paths:
      - 'apps/ratewise/package.json'
      - 'apps/ratewise/seo-paths.config.mjs'
      - 'apps/ratewise/src/features/ratewise/constants.ts'
      - 'apps/ratewise/src/config/app-info.ts'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: 9.10.0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: 安裝依賴
        run: pnpm install --frozen-lockfile

      - name: 生成 manifest.webmanifest
        run: node apps/ratewise/scripts/generate-manifest.mjs

      - name: 生成 llms.txt + llms-full.txt
        run: node apps/ratewise/scripts/generate-llms-txt.mjs

      - name: 建立 PR（若有變更）
        id: create-pr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          commit-message: |
            chore(seo): 同步 committed SEO 靜態產出物

            - 重新生成 manifest.webmanifest（icon cache-busting 版本號）
            - 重新生成 llms.txt + llms-full.txt（版本號 / 幣別 / 路由同步）

            由 GitHub Actions 觸發（設定或版本號異動）
          branch: chore/sync-committed-seo-files
          delete-branch: true
          title: 'chore(seo): 同步 committed SEO 靜態產出物'
          body: |
            ## 自動同步：committed SEO 靜態產出物

            由 GitHub Actions 觸發，來源變更：`package.json` / `seo-paths.config.mjs` / `constants.ts` / `app-info.ts`

            ### 更新項目

            | 檔案 | 說明 |
            |------|------|
            | `apps/ratewise/public/manifest.webmanifest` | PWA icon URL `?v=` 版本號更新 |
            | `apps/ratewise/public/llms.txt` | Version 行版本號同步 |
            | `apps/ratewise/public/llms-full.txt` | Version 行版本號同步 |

            ### 為何是 committed 檔案？

            這 3 個檔案由測試直接讀取（`seo-truthfulness.test.ts` 無 existsSync 保護），
            必須存在於 repo 中讓 CI 測試可以通過。

            ### 自動化

            - CI 全部通過後 **自動 squash merge** 至 `main`
            - 無變更時不建立 PR，靜默略過
          labels: |
            automated
            seo
          add-paths: |
            apps/ratewise/public/manifest.webmanifest
            apps/ratewise/public/llms.txt
            apps/ratewise/public/llms-full.txt

      - name: 啟用 auto-merge
        if: steps.create-pr.outputs.pull-request-number != ''
        run: gh pr merge --auto --squash "${{ steps.create-pr.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 無變更
        if: steps.create-pr.outputs.pull-request-number == ''
        run: echo "ℹ️ committed SEO 產出物無變更，略過建立 PR。"
