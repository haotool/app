# 明洞換匯所（MoneyBox）匯率更新（每 5 分鐘同步）
#
# 職責：定期更新 providers/moneybox/latest.json（TWD→KRW 及全貨幣匯率）
# 容錯：外部 API 故障時優雅降級，指數退避重試（最多 3 次）
# 成本：開源專案 GitHub Actions 免費

name: Update MoneyBox Exchange Rates

# 並發控制：與台灣銀行匯率共用同一 group，避免同時推送至 data 分支衝突
concurrency:
  group: data-branch-push
  cancel-in-progress: false

on:
  schedule:
    # 與台銀 latest workflow 錯開 2 分鐘，降低 GitHub schedule 高峰與同 repo concurrency 衝突。
    - cron: '4,9,14,19,24,29,34,39,44,49,54,59 * * * *'
  workflow_dispatch:
  # 資料更新 workflow 具有 data branch 寫入權限，push 事件只允許已審查的 main。
  push:
    branches:
      - main
    paths:
      - 'scripts/fetch-moneybox-rates.js'
      - '.github/workflows/update-moneybox-rates.yml'

jobs:
  update-moneybox:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      MONEYBOX_FETCH_OUTPUT_FILE: .moneybox-current-fetch.json
      MONEYBOX_LATEST_FILE: public/rates/providers/moneybox/latest.json
      MONEYBOX_HISTORY_DIR: public/rates/providers/moneybox/history
      MONEYBOX_AGGREGATE_FILE: public/rates/providers/moneybox/history-30d.json
      MONEYBOX_RETIRED_LATEST_FILE: public/rates/moneybox.json
      MONEYBOX_RETIRED_HISTORY_DIR: public/rates/moneybox-history
      MONEYBOX_CDN_DATA_BASE: https://cdn.jsdelivr.net/gh/haotool/app@data
      MONEYBOX_PURGE_DATA_BASE: https://purge.jsdelivr.net/gh/haotool/app@data

    steps:
      - name: Checkout data branch
        uses: actions/checkout@v6
        with:
          ref: data
          fetch-depth: 0
        continue-on-error: true

      - name: Create data branch if not exists
        if: failure()
        run: |
          git checkout -b data main
          git push -u origin data
          git checkout data

      - name: Ensure data branch is up to date with scripts
        run: |
          git fetch origin main
          git checkout origin/main -- scripts/fetch-moneybox-rates.js
          git checkout origin/main -- public/rates/ 2>/dev/null || mkdir -p public/rates

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Log schedule diagnostics
        env:
          WORKFLOW_EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_SCHEDULE: ${{ github.event.schedule }}
          WORKFLOW_RUN_ATTEMPT: ${{ github.run_attempt }}
          WORKFLOW_REF: ${{ github.ref }}
          WORKFLOW_SHA: ${{ github.sha }}
        run: |
          echo "🕒 Workflow event: ${WORKFLOW_EVENT_NAME}"
          echo "🕒 Workflow schedule: ${WORKFLOW_SCHEDULE:-n/a}"
          echo "🕒 Workflow ref: ${WORKFLOW_REF}"
          echo "🕒 Workflow sha: ${WORKFLOW_SHA}"
          echo "🕒 Workflow run attempt: ${WORKFLOW_RUN_ATTEMPT}"
          echo "🕒 Runner time UTC: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"

      - name: Fetch MoneyBox exchange rates
        id: fetch-rates
        continue-on-error: true
        run: |
          echo "🔄 Fetching latest exchange rates from MoneyBox (明洞換匯所)..."
          node scripts/fetch-moneybox-rates.js

      - name: Save MoneyBox daily history snapshot
        id: save-history
        if: steps.fetch-rates.outcome == 'success'
        run: |
          CURRENT_DATE=$(TZ=Asia/Taipei date +%Y-%m-%d)
          MONEYBOX_HISTORY_FILE="${MONEYBOX_HISTORY_DIR}/${CURRENT_DATE}.json"
          mkdir -p "$MONEYBOX_HISTORY_DIR"
          if [[ ! -f "$MONEYBOX_FETCH_OUTPUT_FILE" ]]; then
            echo "❌ Current MoneyBox fetch snapshot missing: ${MONEYBOX_FETCH_OUTPUT_FILE}"
            exit 1
          fi
          if [[ ! -f "$MONEYBOX_HISTORY_FILE" ]] || [[ -n "$(git status --short --untracked-files=all -- "$MONEYBOX_LATEST_FILE")" ]]; then
            cp "$MONEYBOX_FETCH_OUTPUT_FILE" "$MONEYBOX_HISTORY_FILE"
            echo "✅ MoneyBox history snapshot refreshed: ${MONEYBOX_HISTORY_FILE}"
          else
            echo "ℹ️ MoneyBox history snapshot already exists for ${CURRENT_DATE}; keeping existing daily snapshot"
          fi
          echo "current_date=${CURRENT_DATE}" >> $GITHUB_OUTPUT
          echo "history_file=${MONEYBOX_HISTORY_FILE}" >> $GITHUB_OUTPUT

      - name: Remove retired MoneyBox alias files
        id: remove-retired-aliases
        if: steps.fetch-rates.outcome == 'success'
        run: |
          removed=false
          for PATH_TO_REMOVE in "$MONEYBOX_RETIRED_LATEST_FILE" "$MONEYBOX_RETIRED_HISTORY_DIR"; do
            if git ls-files --error-unmatch "$PATH_TO_REMOVE" >/dev/null 2>&1 || [[ -e "$PATH_TO_REMOVE" ]]; then
              git rm -r --ignore-unmatch "$PATH_TO_REMOVE"
              removed=true
            fi
          done
          echo "changed=${removed}" >> $GITHUB_OUTPUT

      - name: Check for changes in MoneyBox provider files
        id: git-check
        if: steps.fetch-rates.outcome == 'success'
        env:
          RETIRED_ALIASES_CHANGED: ${{ steps.remove-retired-aliases.outputs.changed }}
        run: |
          if [[ -n "$(git status --short --untracked-files=all -- "$MONEYBOX_LATEST_FILE")" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
          if [[ -n "$(git status --short --untracked-files=all -- "$MONEYBOX_HISTORY_DIR/")" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
          if [[ ! -f "$MONEYBOX_AGGREGATE_FILE" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
          if [[ "$RETIRED_ALIASES_CHANGED" == "true" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Generate moneybox aggregate 30-day history
        if: steps.fetch-rates.outcome == 'success' && steps.git-check.outputs.changed == 'true'
        run: |
          node --input-type=module << 'SCRIPT'
          import { readdirSync, readFileSync, existsSync, mkdirSync, writeFileSync } from 'node:fs';
          import { dirname, join } from 'node:path';

          const HISTORY_DIR = process.env.MONEYBOX_HISTORY_DIR;
          const OUTPUT_PATH = process.env.MONEYBOX_AGGREGATE_FILE;
          const MAX_DAYS = 30;

          if (!existsSync(HISTORY_DIR)) {
            console.error(`❌ History dir not found: ${HISTORY_DIR}`);
            process.exit(1);
          }

          const files = readdirSync(HISTORY_DIR)
            .filter((f) => /^\d{4}-\d{2}-\d{2}\.json$/.test(f))
            .sort()
            .reverse()
            .slice(0, MAX_DAYS);

          const snapshots = [];
          for (const file of files) {
            const date = file.replace(/\.json$/, '');
            try {
              const raw = JSON.parse(readFileSync(join(HISTORY_DIR, file), 'utf-8'));
              snapshots.push({ date, raw });
            } catch (e) {
              console.warn(`⚠️ Skip ${file}: ${e.message}`);
            }
          }

          const aggregate = {
            providerId: 'moneybox',
            generatedAt: new Date().toISOString(),
            snapshots,
          };

          const outDir = dirname(OUTPUT_PATH);
          if (!existsSync(outDir)) mkdirSync(outDir, { recursive: true });
          writeFileSync(OUTPUT_PATH, JSON.stringify(aggregate, null, 2) + '\n');

          console.log(`✅ moneybox aggregate: ${snapshots.length} days → ${OUTPUT_PATH}`);
          SCRIPT

      - name: Commit and push changes
        if: steps.fetch-rates.outcome == 'success' && steps.git-check.outputs.changed == 'true'
        env:
          TODAY_HISTORY_FILE: ${{ steps.save-history.outputs.history_file }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          # 只 add 當日 history 檔與 aggregate，避免 git checkout origin/main -- public/rates/
          # 後把 data branch 既有的前幾日 history snapshot 一併 stage 成刪除（會清掉公開
          # MoneyBox history API 與趨勢圖前日資料）。SSOT：每次只動當日 snapshot + aggregate。
          git add "$MONEYBOX_LATEST_FILE" "$TODAY_HISTORY_FILE" "$MONEYBOX_AGGREGATE_FILE"

          # 取得更新資訊
          UPDATE_TIME=$(node -p "JSON.parse(require('fs').readFileSync(process.env.MONEYBOX_LATEST_FILE)).updateTime")
          TWD_SELL=$(node -p "JSON.parse(require('fs').readFileSync(process.env.MONEYBOX_LATEST_FILE)).rates.TWD.sell")
          TWD_BUY=$(node -p "JSON.parse(require('fs').readFileSync(process.env.MONEYBOX_LATEST_FILE)).rates.TWD.buy")

          # 檢查上一個 commit 是否也是 MoneyBox 匯率更新
          LAST_COMMIT_MSG=$(git log -1 --pretty=%B 2>/dev/null || echo "")

          if [[ "$LAST_COMMIT_MSG" == *"chore(rates): update moneybox rates"* ]]; then
            echo "📝 Amending previous commit on data branch..."
            git commit --amend --reset-author -m "chore(rates): update moneybox rates - ${UPDATE_TIME}" \
              -m "TWD sell: ${TWD_SELL} KRW/TWD (旅客持台幣現金換韓元到手匯率)" \
              -m "TWD buy: ${TWD_BUY} KRW/TWD (旅客持韓元換台幣到手匯率)" \
              -m "🤖 Auto-updated every 5 minutes" \
              -m "Source: https://cems.moneybox.or.kr/"

            git pull --rebase origin data || true
            git push --force-with-lease origin data
          else
            echo "📝 Creating new commit on data branch..."
            git commit -m "chore(rates): update moneybox rates - ${UPDATE_TIME}" \
              -m "TWD sell: ${TWD_SELL} KRW/TWD (旅客持台幣現金換韓元到手匯率)" \
              -m "TWD buy: ${TWD_BUY} KRW/TWD (旅客持韓元換台幣到手匯率)" \
              -m "🤖 Auto-updated every 5 minutes" \
              -m "Source: https://cems.moneybox.or.kr/"

            echo "🔄 Pulling latest changes before push..."
            git pull --rebase origin data || true

            # 重試機制：最多重試 3 次
            for i in 1 2 3; do
              echo "📤 Attempting to push (try $i/3)..."
              if git push origin data; then
                echo "✅ Push successful"
                break
              else
                if [ $i -lt 3 ]; then
                  echo "⚠️ Push failed, retrying in 5 seconds..."
                  sleep 5
                  git pull --rebase origin data || true
                else
                  echo "❌ Push failed after 3 attempts"
                  exit 1
                fi
              fi
            done
          fi

      - name: Purge jsDelivr CDN cache
        if: steps.fetch-rates.outcome == 'success' && steps.git-check.outputs.changed == 'true'
        env:
          CURRENT_DATE: ${{ steps.save-history.outputs.current_date }}
        run: |
          PURGE_URL="${MONEYBOX_PURGE_DATA_BASE}/${MONEYBOX_LATEST_FILE}"
          HISTORY_PURGE_URL="${MONEYBOX_PURGE_DATA_BASE}/${MONEYBOX_HISTORY_DIR}/${CURRENT_DATE}.json"
          AGGREGATE_PURGE_URL="${MONEYBOX_PURGE_DATA_BASE}/${MONEYBOX_AGGREGATE_FILE}"
          echo "🧹 Purging jsDelivr CDN cache..."
          for URL in "$PURGE_URL" "$HISTORY_PURGE_URL" "$AGGREGATE_PURGE_URL"; do
            for i in 1 2 3; do
              HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
              if [ "$HTTP_STATUS" = "200" ]; then
                echo "✅ CDN cache purged successfully (attempt $i): $URL"
                break
              else
                echo "⚠️ Purge attempt $i failed (HTTP $HTTP_STATUS): $URL"
                if [ $i -lt 3 ]; then sleep 5; fi
              fi
            done
          done

      - name: Refresh MoneyBox provider files from remote data branch
        id: refresh-remote
        if: steps.fetch-rates.outcome == 'success' && steps.git-check.outputs.changed == 'true'
        continue-on-error: true
        run: |
          # 收尾同步僅用於摘要校對，不得覆蓋已成功的資料推送結果。
          git rebase --abort 2>/dev/null || true
          for i in 1 2 3; do
            echo "🔄 Refreshing MoneyBox provider files from remote data branch (try $i/3)..."
            if git fetch origin data && git checkout origin/data -- "$MONEYBOX_LATEST_FILE" "$MONEYBOX_HISTORY_DIR" "$MONEYBOX_AGGREGATE_FILE"; then
              echo "✅ Remote refresh successful"
              exit 0
            fi

            if [ $i -lt 3 ]; then
              echo "⚠️ Remote refresh failed, retrying in 5 seconds..."
              sleep 5
            fi
          done

          echo "❌ Remote refresh failed after 3 attempts"
          exit 1

      - name: Update workflow summary (success)
        if: steps.fetch-rates.outcome == 'success' && steps.git-check.outputs.changed == 'true'
        env:
          CURRENT_DATE: ${{ steps.save-history.outputs.current_date }}
        run: |
          echo "# ✅ MoneyBox exchange rates updated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📊 Update Information" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`data\` (isolated from main)" >> $GITHUB_STEP_SUMMARY
          echo "- **Workflow event:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Workflow schedule:** ${{ github.event.schedule || 'manual/push' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner time (UTC):** $(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_STEP_SUMMARY
          echo "- **TWD Sell Rate:** $(node -p "JSON.parse(require('fs').readFileSync(process.env.MONEYBOX_LATEST_FILE)).rates.TWD.sell") KRW/TWD" >> $GITHUB_STEP_SUMMARY
          echo "- **TWD Buy Rate:** $(node -p "JSON.parse(require('fs').readFileSync(process.env.MONEYBOX_LATEST_FILE)).rates.TWD.buy") KRW/TWD" >> $GITHUB_STEP_SUMMARY
          echo "- **Update Time (Seoul):** $(node -p "JSON.parse(require('fs').readFileSync(process.env.MONEYBOX_LATEST_FILE)).updateTime")" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🔗 CDN URL" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${MONEYBOX_CDN_DATA_BASE}/${MONEYBOX_LATEST_FILE}" >> $GITHUB_STEP_SUMMARY
          echo "${MONEYBOX_CDN_DATA_BASE}/${MONEYBOX_HISTORY_DIR}/${CURRENT_DATE}.json" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ⚡ CDN Purge" >> $GITHUB_STEP_SUMMARY
          echo "jsDelivr cache purged — MoneyBox provider JSON available on CDN within seconds." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 💡 Rate Meaning" >> $GITHUB_STEP_SUMMARY
          echo "- **Sell rate**: 旅客持 TWD 現金換 KRW 的實際到手匯率（明洞換匯所賣出 KRW）" >> $GITHUB_STEP_SUMMARY
          echo "- **Buy rate**: 換匯所買入 TWD 的匯率（高於 sell，包含手續費差價）" >> $GITHUB_STEP_SUMMARY

      - name: Update workflow summary (remote refresh warning)
        if: steps.fetch-rates.outcome == 'success' && steps.git-check.outputs.changed == 'true' && steps.refresh-remote.outcome == 'failure'
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ⚠️ Post-push verification warning" >> $GITHUB_STEP_SUMMARY
          echo "- Data branch push succeeded, but GitHub returned a transient error during post-push refresh." >> $GITHUB_STEP_SUMMARY
          echo "- The workflow kept the successful update and will verify again on the next scheduled run or manual rerun." >> $GITHUB_STEP_SUMMARY

      - name: No changes detected
        if: steps.fetch-rates.outcome == 'success' && steps.git-check.outputs.changed != 'true'
        run: |
          echo "# ℹ️ No MoneyBox rate changes detected" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The MoneyBox exchange rates have not changed since the last update." >> $GITHUB_STEP_SUMMARY
          echo "Next check: 5 minutes from now" >> $GITHUB_STEP_SUMMARY

      - name: Update workflow summary (API failure)
        if: steps.fetch-rates.outcome == 'failure'
        run: |
          echo "# ⚠️ MoneyBox API temporarily unavailable" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Status" >> $GITHUB_STEP_SUMMARY
          echo "- MoneyBox API is experiencing issues" >> $GITHUB_STEP_SUMMARY
          echo "- Retry mechanism attempted with exponential backoff (3 retries)" >> $GITHUB_STEP_SUMMARY
          echo "- Workflow continues successfully (graceful degradation)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Impact" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ **No user impact**: SEO examples continue using cached MoneyBox rates" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ **Automatic recovery**: Next scheduled run in 5 minutes" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ **No manual intervention required**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Technical Details" >> $GITHUB_STEP_SUMMARY
          echo "- API URL: https://cems.moneybox.or.kr/api/cmd.php?cmd=C011" >> $GITHUB_STEP_SUMMARY
          echo "- Retry strategy: Exponential backoff (1s, 2s, 4s)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_This is a transient API failure and does not indicate a problem with our system._" >> $GITHUB_STEP_SUMMARY
