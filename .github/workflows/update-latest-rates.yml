# 即時匯率更新（每 5 分鐘同步臺灣銀行牌告）
#
# 職責：定期更新 latest.json
# 容錯：外部 API 故障時優雅降級，指數退避重試（最多 3 次）
# 成本：開源專案 GitHub Actions 免費

name: Update Latest Exchange Rates

# 並發控制：確保同一時間只有一個 workflow 推送至 data 分支
concurrency:
  group: data-branch-push
  cancel-in-progress: false

on:
  schedule:
    # GitHub 官方不保證 schedule 準點執行；避開整點可降低高負載延遲 / 掉單機率。
    - cron: '2,7,12,17,22,27,32,37,42,47,52,57 * * * *'
  workflow_dispatch:
  # 腳本變更時觸發測試
  # 資料更新 workflow 具有 data branch 寫入權限，push 事件只允許已審查的 main。
  push:
    branches:
      - main
    paths:
      - 'scripts/fetch-taiwan-bank-rates.js'
      - '.github/workflows/update-latest-rates.yml'

jobs:
  update-latest:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout data branch
        uses: actions/checkout@v7
        with:
          ref: data
          fetch-depth: 0
        continue-on-error: true

      - name: Create data branch if not exists
        if: failure()
        run: |
          git checkout -b data main
          git push -u origin data
          git checkout data

      - name: Ensure data branch is up to date with scripts
        run: |
          # 使用觸發 ref 的腳本版本：schedule 為 main HEAD；push/dispatch 為對應分支，
          # 讓腳本修正能在分支上先驗證，不必等合併 main。
          git fetch origin ${{ github.sha }}
          git checkout ${{ github.sha }} -- scripts/fetch-taiwan-bank-rates.js
          git checkout ${{ github.sha }} -- scripts/fetch-taiwan-bank-rates-browser.mjs
          git checkout ${{ github.sha }} -- public/rates/ 2>/dev/null || mkdir -p public/rates

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Log schedule diagnostics
        env:
          WORKFLOW_EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_SCHEDULE: ${{ github.event.schedule }}
          WORKFLOW_RUN_ATTEMPT: ${{ github.run_attempt }}
          WORKFLOW_REF: ${{ github.ref }}
          WORKFLOW_SHA: ${{ github.sha }}
        run: |
          echo "🕒 Workflow event: ${WORKFLOW_EVENT_NAME}"
          echo "🕒 Workflow schedule: ${WORKFLOW_SCHEDULE:-n/a}"
          echo "🕒 Workflow ref: ${WORKFLOW_REF}"
          echo "🕒 Workflow sha: ${WORKFLOW_SHA}"
          echo "🕒 Workflow run attempt: ${WORKFLOW_RUN_ATTEMPT}"
          echo "🕒 Runner time UTC: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"

      - name: Fetch Taiwan Bank exchange rates
        id: fetch-rates
        continue-on-error: true
        run: |
          echo "🔄 Fetching latest exchange rates from Taiwan Bank..."
          node scripts/fetch-taiwan-bank-rates.js

      # 台銀 bot challenge fallback：純 fetch 被擋時改用真瀏覽器（xvfb headed Chrome）
      # 於頁面內完成 JS 驗證後下載 CSV，再以 CSV_INPUT_FILE 模式解析寫檔。
      - name: Fetch via browser fallback (bot challenge)
        id: fetch-browser
        if: steps.fetch-rates.outcome == 'failure'
        continue-on-error: true
        run: |
          echo "🤖 Direct fetch blocked — falling back to real browser..."
          FALLBACK_DIR="$RUNNER_TEMP/twbank-browser"
          mkdir -p "$FALLBACK_DIR"
          cp scripts/fetch-taiwan-bank-rates-browser.mjs "$FALLBACK_DIR/"
          pushd "$FALLBACK_DIR" > /dev/null
          npm init -y > /dev/null
          npm install --no-audit --no-fund --silent @playwright/test@1.61.1
          CSV_FILE="$FALLBACK_DIR/taiwan-bank.csv"
          xvfb-run -a node fetch-taiwan-bank-rates-browser.mjs "$CSV_FILE"
          popd > /dev/null
          CSV_INPUT_FILE="$CSV_FILE" node scripts/fetch-taiwan-bank-rates.js

      - name: Resolve fetch status
        id: fetch-status
        run: |
          if [ "${{ steps.fetch-rates.outcome }}" = "success" ] || [ "${{ steps.fetch-browser.outcome }}" = "success" ]; then
            echo "ok=true" >> $GITHUB_OUTPUT
            echo "✅ Rates fetched (direct: ${{ steps.fetch-rates.outcome }}, browser: ${{ steps.fetch-browser.outcome }})"
          else
            echo "ok=false" >> $GITHUB_OUTPUT
            echo "❌ Both direct and browser fetch failed"
          fi

      - name: Check for changes in latest.json
        id: git-check
        if: steps.fetch-status.outputs.ok == 'true'
        run: |
          git diff --quiet public/rates/latest.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.fetch-status.outputs.ok == 'true' && steps.git-check.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/rates/latest.json

          # 取得更新資訊
          UPDATE_TIME=$(node -p "JSON.parse(require('fs').readFileSync('public/rates/latest.json')).updateTime")
          CURRENCY_COUNT=$(node -p "Object.keys(JSON.parse(require('fs').readFileSync('public/rates/latest.json')).rates).length")

          # 檢查上一個 commit 是否也是即時匯率更新
          LAST_COMMIT_MSG=$(git log -1 --pretty=%B 2>/dev/null || echo "")

          if [[ "$LAST_COMMIT_MSG" == *"chore(rates): update latest rates"* ]]; then
            echo "📝 Amending previous commit on data branch..."
            git commit --amend --reset-author -m "chore(rates): update latest rates - ${UPDATE_TIME}" \
              -m "Updated ${CURRENCY_COUNT} currencies from Taiwan Bank" \
              -m "🤖 Auto-updated every 5 minutes" \
              -m "Source: https://rate.bot.com.tw/xrt/flcsv/0/day"

            # 推送前先拉取最新變更，避免並發衝突
            git pull --rebase origin data || true
            git push --force-with-lease origin data
          else
            echo "📝 Creating new commit on data branch..."
            git commit -m "chore(rates): update latest rates - ${UPDATE_TIME}" \
              -m "Updated ${CURRENCY_COUNT} currencies from Taiwan Bank" \
              -m "🤖 Auto-updated every 5 minutes" \
              -m "Source: https://rate.bot.com.tw/xrt/flcsv/0/day"

            # 推送前先拉取最新變更，避免並發衝突
            echo "🔄 Pulling latest changes before push..."
            git pull --rebase origin data || true

            # 重試機制：最多重試 3 次
            for i in 1 2 3; do
              echo "📤 Attempting to push (try $i/3)..."
              if git push origin data; then
                echo "✅ Push successful"
                break
              else
                if [ $i -lt 3 ]; then
                  echo "⚠️ Push failed, retrying in 5 seconds..."
                  sleep 5
                  git pull --rebase origin data || true
                else
                  echo "❌ Push failed after 3 attempts"
                  exit 1
                fi
              fi
            done
          fi

      - name: Purge jsDelivr CDN cache
        if: steps.fetch-status.outputs.ok == 'true' && steps.git-check.outputs.changed == 'true'
        run: |
          PURGE_URL="https://purge.jsdelivr.net/gh/haotool/app@data/public/rates/latest.json"
          echo "🧹 Purging jsDelivr CDN cache..."
          for i in 1 2 3; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$PURGE_URL")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ CDN cache purged successfully (attempt $i)"
              break
            else
              echo "⚠️ Purge attempt $i failed (HTTP $HTTP_STATUS)"
              if [ $i -lt 3 ]; then sleep 5; fi
            fi
          done

      - name: Refresh latest.json from remote data branch
        id: refresh-remote
        if: steps.fetch-status.outputs.ok == 'true' && steps.git-check.outputs.changed == 'true'
        continue-on-error: true
        run: |
          # 收尾同步僅用於摘要校對，不得覆蓋已成功的資料推送結果。
          git rebase --abort 2>/dev/null || true
          for i in 1 2 3; do
            echo "🔄 Refreshing latest.json from remote data branch (try $i/3)..."
            if git fetch origin data && git checkout origin/data -- public/rates/latest.json; then
              echo "✅ Remote refresh successful"
              exit 0
            fi

            if [ $i -lt 3 ]; then
              echo "⚠️ Remote refresh failed, retrying in 5 seconds..."
              sleep 5
            fi
          done

          echo "❌ Remote refresh failed after 3 attempts"
          exit 1

      - name: Update workflow summary (success)
        if: steps.fetch-status.outputs.ok == 'true' && steps.git-check.outputs.changed == 'true'
        run: |
          echo "# ✅ Latest exchange rates updated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📊 Update Information" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`data\` (isolated from main)" >> $GITHUB_STEP_SUMMARY
          echo "- **Workflow event:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Workflow schedule:** ${{ github.event.schedule || 'manual/push' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner time (UTC):** $(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_STEP_SUMMARY
          echo "- **Currencies Updated:** $(node -p "Object.keys(JSON.parse(require('fs').readFileSync('public/rates/latest.json')).rates).length")" >> $GITHUB_STEP_SUMMARY
          echo "- **Update Time:** $(node -p "JSON.parse(require('fs').readFileSync('public/rates/latest.json')).updateTime")" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🔗 CDN URL" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "https://cdn.jsdelivr.net/gh/haotool/app@data/public/rates/latest.json" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ⚡ CDN Purge" >> $GITHUB_STEP_SUMMARY
          echo "jsDelivr cache purged — latest.json available on CDN within seconds." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📈 Sample Rates (TWD)" >> $GITHUB_STEP_SUMMARY
          echo "- **USD:** $(node -p "JSON.parse(require('fs').readFileSync('public/rates/latest.json')).rates.USD")" >> $GITHUB_STEP_SUMMARY
          echo "- **EUR:** $(node -p "JSON.parse(require('fs').readFileSync('public/rates/latest.json')).rates.EUR")" >> $GITHUB_STEP_SUMMARY
          echo "- **JPY:** $(node -p "JSON.parse(require('fs').readFileSync('public/rates/latest.json')).rates.JPY")" >> $GITHUB_STEP_SUMMARY
          echo "- **CNY:** $(node -p "JSON.parse(require('fs').readFileSync('public/rates/latest.json')).rates.CNY")" >> $GITHUB_STEP_SUMMARY

      - name: Update workflow summary (remote refresh warning)
        if: steps.fetch-status.outputs.ok == 'true' && steps.git-check.outputs.changed == 'true' && steps.refresh-remote.outcome == 'failure'
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ⚠️ Post-push verification warning" >> $GITHUB_STEP_SUMMARY
          echo "- Data branch push succeeded, but GitHub returned a transient error during post-push refresh." >> $GITHUB_STEP_SUMMARY
          echo "- The workflow kept the successful update and will verify again on the next scheduled run or manual rerun." >> $GITHUB_STEP_SUMMARY

      - name: No changes detected
        if: steps.fetch-status.outputs.ok == 'true' && steps.git-check.outputs.changed != 'true'
        run: |
          echo "# ℹ️ No rate changes detected" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The exchange rates have not changed since the last update." >> $GITHUB_STEP_SUMMARY
          echo "Next check: 5 minutes from now" >> $GITHUB_STEP_SUMMARY

      # 資料新鮮度守門：抓取全數失敗時，若 committed latest.json 已超過門檻
      # 未更新，必須讓 workflow 失敗曝光事故——禁止用綠燈掩蓋持續性故障
      #（2026-06/29~07/03 台銀 bot challenge 造成 4 天停更即因舊版無此守門而未被發現）。
      # 耦合防護：本 gate 的紅燈同時是 update-historical-rates.yml liveness 守門的訊號來源
      #（該守門以「12h 內零 success」判定持續 outage 並拒寫快照），不可改為 continue-on-error。
      - name: Data staleness gate (fail on persistent outage)
        if: steps.fetch-status.outputs.ok != 'true'
        env:
          STALENESS_THRESHOLD_HOURS: '6'
        run: |
          AGE_HOURS=$(node -e "
            const { readFileSync } = require('fs');
            try {
              const data = JSON.parse(readFileSync('public/rates/latest.json', 'utf8'));
              const ageMs = Date.now() - new Date(data.timestamp).getTime();
              console.log(Math.floor(ageMs / 3600000));
            } catch { console.log(999); }
          ")
          echo "📅 latest.json age: ${AGE_HOURS}h (threshold: ${STALENESS_THRESHOLD_HOURS}h)"

          echo "# ⚠️ Taiwan Bank rate fetch failed (direct + browser fallback)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Direct fetch outcome: ${{ steps.fetch-rates.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- Browser fallback outcome: ${{ steps.fetch-browser.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- Committed latest.json age: ${AGE_HOURS}h" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$AGE_HOURS" -ge "$STALENESS_THRESHOLD_HOURS" ]; then
            echo "## ❌ Persistent outage detected" >> $GITHUB_STEP_SUMMARY
            echo "Rates have been stale for over ${STALENESS_THRESHOLD_HOURS}h — manual investigation required." >> $GITHUB_STEP_SUMMARY
            echo "Check whether Taiwan Bank changed its bot challenge or CSV endpoint." >> $GITHUB_STEP_SUMMARY
            echo "::error::Exchange rates stale for ${AGE_HOURS}h and all fetch paths failed"
            exit 1
          fi

          echo "## Transient failure tolerated" >> $GITHUB_STEP_SUMMARY
          echo "Data is still fresh (<${STALENESS_THRESHOLD_HOURS}h); next scheduled run retries in 5 minutes." >> $GITHUB_STEP_SUMMARY
